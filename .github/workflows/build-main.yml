name: build-main

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: Build .NET Functions
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore XBPPA-endpoint-mirror.csproj

      - name: Build
        run: dotnet build XBPPA-endpoint-mirror.csproj --configuration Release --no-restore

      - name: Publish
        run: dotnet publish XBPPA-endpoint-mirror.csproj --configuration Release --output ./publish --no-build

      - name: Upload publish artifact
        uses: actions/upload-artifact@v4
        with:
          name: functionapp
          path: ./publish
          if-no-files-found: error

  docker:
    name: Build Docker image
    needs: build
    runs-on: ubuntu-latest
    # Only push the image on main; PRs just build to verify the Dockerfile works
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR (push only on main)
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build (and push on main)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.ref == 'refs/heads/main' && github.event_name == 'push' }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/dbx-mirror:latest
            ghcr.io/${{ github.repository_owner }}/dbx-mirror:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max